<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#071426" />
  <meta name="description" content="BCS 100 Pro - a 100-day BCS preliminary preparation planner, subject-wise study library, past-question bank and quiz app." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>BCS 100 Pro</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icon.svg" />
  <link rel="apple-touch-icon" href="assets/icon-192.svg" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/enhancements.css" />
  <link rel="stylesheet" href="css/study.css" />
</head>
<body>
  <div id="appShell" class="app-shell">
    <header class="topbar">
      <div class="brand-wrap">
        <div class="brand-mark">100</div>
        <div>
          <h1>BCS 100 <span>Pro</span></h1>
          <p id="headerSubtitle">৫০তম বিসিএস প্রিলিমিনারি • ১০০ দিনের পরিকল্পনা</p>
        </div>
      </div>
      <div class="top-actions">
        <button id="backBtn" class="icon-btn" type="button" aria-label="Go back" hidden>←</button>
        <button id="themeBtn" class="icon-btn" type="button" aria-label="Toggle theme">☾</button>
      </div>
    </header>

    <main id="view" class="view" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="Primary navigation">
      <button type="button" class="nav-item active" data-route="home"><span>⌂</span><small>হোম</small></button>
      <button type="button" class="nav-item" data-route="plan"><span>▣</span><small>১০০ দিন</small></button>
      <button type="button" class="nav-item" data-route="learn"><span>◫</span><small>সিলেবাস</small></button>
      <button type="button" class="nav-item" data-route="quiz"><span>✓</span><small>কুইজ</small></button>
      <button type="button" class="nav-item" data-route="analytics"><span>⌁</span><small>অগ্রগতি</small></button>
    </nav>
  </div>

  <div id="toast" class="toast" role="status"></div>
  <div id="modalRoot"></div>

  <script src="js/data.js"></script>
  <script src="js/syllabus-update.js"></script>
  <script src="js/questions-extra-1.js"></script>
  <script src="js/questions-extra-2.js"></script>
  <script src="js/questions-extra-3.js"></script>
  <script src="js/questions-extra-4.js"></script>
  <script src="js/questions-extra-5.js"></script>
  <script src="js/questions-extra-6.js"></script>
  <script src="js/questions-extra-7.js"></script>
  <script src="js/past-1.js"></script>
  <script src="js/past-2.js"></script>
  <script src="js/past-3.js"></script>
  <script src="js/past-4.js"></script>
  <script src="js/past-5.js"></script>
  <script src="js/study-bundle-1.js"></script>
  <script src="js/study-bundle-2.js"></script>
  <script src="js/study-bundle-3.js"></script>
  <script src="js/study-bundle-4.js"></script>
  <script src="js/study-bundle-5.js"></script>
  <script src="js/quiz-core.js"></script>
  <script src="js/app-base.js"></script>
  <script src="js/app-views.js"></script>
  <script src="js/app-quiz.js"></script>
  <script src="js/app-study.js"></script>
  <script src="js/app-init.js"></script>
</body>
</html>
