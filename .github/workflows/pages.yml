name: Validate BCS 100 Pro

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-bcs100-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate static application
        shell: bash
        run: |
          set -euo pipefail
          required=(
            index.html
            manifest.json
            sw.js
            .nojekyll
            package.json
            BCS_100_Pro_Colab.ipynb
            css/styles.css
            css/enhancements.css
            css/study.css
            assets/icon.svg
            assets/icon-192.svg
            assets/icon-512.svg
            js/data.js
            js/syllabus-update.js
            js/questions-extra-1.js
            js/questions-extra-2.js
            js/questions-extra-3.js
            js/questions-extra-4.js
            js/questions-extra-5.js
            js/questions-extra-6.js
            js/questions-extra-7.js
            js/past-1.js
            js/past-2.js
            js/past-3.js
            js/past-4.js
            js/past-5.js
            js/study-bundle-1.js
            js/study-bundle-2.js
            js/study-bundle-3.js
            js/study-bundle-4.js
            js/study-bundle-5.js
            js/study-sources.js
            js/quiz-core.js
            js/app-base.js
            js/app-views.js
            js/app-quiz.js
            js/app-study.js
            js/app-init.js
            tests/smoke.test.js
            tests/study.test.js
            tests/quiz-ui.test.js
          )
          for file in "${required[@]}"; do
            test -f "$file" || { echo "Missing required file: $file"; exit 1; }
          done
          for file in js/*.js tests/*.js sw.js; do node --check "$file"; done
          npm test

      - name: Validate Colab notebook
        shell: python
        run: |
          import ast
          import json
          from pathlib import Path

          path = Path("BCS_100_Pro_Colab.ipynb")
          notebook = json.loads(path.read_text(encoding="utf-8"))

          assert notebook.get("nbformat") == 4, "Notebook must use nbformat 4"
          assert notebook.get("cells"), "Notebook must contain cells"

          for index, cell in enumerate(notebook["cells"]):
              if cell.get("cell_type") != "code":
                  continue
              source = "".join(cell.get("source", []))
              ast.parse(source, filename=f"cell_{index}")

          print(f"Validated Colab notebook with {len(notebook['cells'])} cells.")
