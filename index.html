<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#071426" />
  <meta name="description" content="BCS 100 Pro - a 100-day BCS preliminary preparation planner, syllabus tracker and quiz app." />
  <title>BCS 100 Pro</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icon.svg" />
  <link rel="apple-touch-icon" href="assets/icon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="appShell" class="app-shell">
    <header class="topbar">
      <div class="brand-wrap">
        <div class="brand-mark">100</div>
        <div>
          <h1>BCS 100 <span>Pro</span></h1>
          <p id="headerSubtitle">৫০তম বিসিএস প্রিলিমিনারি • ১০০ দিনের পরিকল্পনা</p>
        </div>
      </div>
      <button id="themeBtn" class="icon-btn" aria-label="Toggle theme">☾</button>
    </header>

    <main id="view" class="view" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="Primary navigation">
      <button class="nav-item active" data-route="home"><span>⌂</span><small>হোম</small></button>
      <button class="nav-item" data-route="plan"><span>▣</span><small>১০০ দিন</small></button>
      <button class="nav-item" data-route="learn"><span>◫</span><small>সিলেবাস</small></button>
      <button class="nav-item" data-route="quiz"><span>✓</span><small>কুইজ</small></button>
      <button class="nav-item" data-route="analytics"><span>⌁</span><small>অগ্রগতি</small></button>
    </nav>
  </div>

  <div id="toast" class="toast" role="status"></div>
  <div id="modalRoot"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
