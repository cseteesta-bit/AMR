name: Validate BCS 100 Pro

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-bcs100-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate static application
        shell: bash
        run: |
          set -euo pipefail
          required=(
            index.html
            manifest.json
            sw.js
            .nojekyll
            package.json
            css/styles.css
            css/enhancements.css
            assets/icon.svg
            assets/icon-192.svg
            assets/icon-512.svg
            js/data.js
            js/syllabus-update.js
            js/questions-extra-1.js
            js/questions-extra-2.js
            js/questions-extra-3.js
            js/questions-extra-4.js
            js/questions-extra-5.js
            js/questions-extra-6.js
            js/questions-extra-7.js
            js/past-1.js
            js/past-2.js
            js/past-3.js
            js/past-4.js
            js/past-5.js
            js/quiz-core.js
            js/app-base.js
            js/app-views.js
            js/app-quiz.js
            js/app-init.js
            tests/smoke.test.js
          )
          for file in "${required[@]}"; do
            test -f "$file" || { echo "Missing required file: $file"; exit 1; }
          done
          for file in js/*.js tests/*.js sw.js server.js; do node --check "$file"; done
          npm test
