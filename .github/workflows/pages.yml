name: Publish BCS 100 Pro

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-gh-pages
  cancel-in-progress: true

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate static application
        shell: bash
        run: |
          set -euo pipefail
          required=(
            index.html
            manifest.json
            sw.js
            .nojekyll
            css/styles.css
            assets/icon.svg
            js/data.js
            js/syllabus-update.js
            js/questions-extra-1.js
            js/questions-extra-2.js
            js/questions-extra-3.js
            js/questions-extra-4.js
            js/questions-extra-5.js
            js/questions-extra-6.js
            js/questions-extra-7.js
            js/app.js
          )
          for file in "${required[@]}"; do
            test -f "$file" || { echo "Missing required file: $file"; exit 1; }
          done
          for file in js/*.js sw.js; do node --check "$file"; done
          node <<'NODE'
          global.window={};
          require('./js/data.js');
          require('./js/syllabus-update.js');
          for(let i=1;i<=7;i++)require(`./js/questions-extra-${i}.js`);
          const data=window.BCS_DATA;
          const marks=data.subjects.reduce((sum,subject)=>sum+subject.marks,0);
          if(data.questions.length!==120)throw new Error(`Expected 120 questions, found ${data.questions.length}`);
          if(marks!==200)throw new Error(`Expected 200 syllabus marks, found ${marks}`);
          if(new Set(data.questions.map(q=>q.id)).size!==data.questions.length)throw new Error('Duplicate question IDs detected');
          console.log(`Validated ${data.questions.length} questions across ${data.subjects.length} subjects and ${marks} marks.`);
          NODE

      - name: Publish main to gh-pages
        shell: bash
        run: |
          set -euo pipefail
          git push --force origin HEAD:gh-pages
