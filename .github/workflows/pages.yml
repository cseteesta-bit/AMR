name: Publish BCS 100 Pro

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-gh-pages
  cancel-in-progress: true

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate static application
        shell: bash
        run: |
          set -euo pipefail
          required=(
            index.html
            manifest.json
            sw.js
            .nojekyll
            css/styles.css
            js/data.js
            js/app.js
            assets/icon.svg
          )
          for file in "${required[@]}"; do
            test -f "$file" || { echo "Missing required file: $file"; exit 1; }
          done
          node --check js/data.js
          node --check js/app.js

      - name: Publish main to gh-pages
        shell: bash
        run: |
          set -euo pipefail
          git push --force origin HEAD:gh-pages
